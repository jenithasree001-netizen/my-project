<!DOCTYPE html>
<html>
<head>
    <title>Registration Form</title>
    <style>
        body{
            margin:0;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background-color:gainsboro;
            font-family:Arial;
        }
        .container{
            width:500px;
            background:white;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
        }
        .header{
            background:rgb(25, 0, 139);
            color:white;
            text-align:center;
            padding:20px;
            font-size:30px;
            font-weight:bold;
        }
        .form-box{
            padding:30px;
        }
        .row{
            display:flex;
            gap:20px;
            margin-bottom:20px;
        }
        .field{
            flex:1;
            display:flex;
            flex-direction:column;
        }
        label{
            margin-bottom:8px;
            font-size:18px;
        }
        input,
        select{
            padding:12px;
            font-size:16px;
            border:1px solid rgba(204, 204, 204, 0.993);
        }
        .full{
            display:flex;
            flex-direction:column;
            margin-bottom:20px;
        }
        button{
            width:100%;
            padding:15px;
            background:rgb(32, 78, 178);
            color:white;
            border:none;
            font-size:22px;
            cursor:pointer;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        Registration Form
    </div>
    <div class="form-box">
        <div class="row">
            <div class="field">
                <label>First Name</label>
                <input type="text">
            </div>
            <div class="field">
                <label>Last Name</label>
                <input type="text">
            </div>
        </div>
        <div class="full">
            <label>Email Address</label>
            <input type="email">
        </div>
        <div class="full">
            <label>Phone</label>
            <input type="tel">
        </div>
        <div class="row">
            <div class="field">
                <label>City</label>
                <select>
                    <option>London</option>
                    <option>Chennai</option>
                    <option>Mumbai</option>
                </select>
            </div>
            <div class="field">
                <label>Country</label>
                <select>
                    <option>India</option>
                    <option>UK</option>
                    <option>USA</option>
                </select>
            </div>
        </div>
        <button>Get Started</button>
    </div>
</div>
</body>
</html>
