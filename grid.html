<!DOCTYPE html>
<html>
<head>
<style>
.container{
  display:grid;
  grid-template-columns:auto auto;
  gap:10px;
}
.box{
  border:1px solid black;
  padding:10px;
}
</style>
</head>
<body>

<div class="container">
  <div class="box">1</div>
  <div class="box">2</div>
  <div class="box">3</div>
  <div class="box">4</div>
</div>

</body>
</html>
